{% load static %} {% load i18n %}

<!doctype html>
{% get_current_language as LANGUAGE_CODE %}
<html class="h-full" lang="{{ LANGUAGE_CODE }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    {% with title="Constructor Telegram Bots" %}
    <title>{{ title }}</title>
    <meta name="description" content="{{ seo.description }}" data-react-helmet="true" />

    <link
      rel="alternate"
      hreflang="en"
      href="{{ request.scheme }}://{{ request.get_host }}{{ path_without_lang }}"
      data-react-helmet="true"
    />
    <link
      rel="alternate"
      hreflang="uk"
      href="{{ request.scheme }}://{{ request.get_host }}/uk{{ path_without_lang }}"
      data-react-helmet="true"
    />
    <link
      rel="alternate"
      hreflang="ru"
      href="{{ request.scheme }}://{{ request.get_host }}/ru{{ path_without_lang }}"
      data-react-helmet="true"
    />
    <link
      rel="alternate"
      hreflang="x-default"
      href="{{ request.scheme }}://{{ request.get_host }}{{ path_without_lang }}"
      data-react-helmet="true"
    />

    <meta property="og:type" content="website" data-react-helmet="true" />
    <meta property="og:title" content="{{ title }}" data-react-helmet="true" />
    <meta
      property="og:description"
      content="{{ seo.description }}"
      data-react-helmet="true"
    />
    <meta
      property="og:url"
      content="{{ request.build_absolute_uri }}"
      data-react-helmet="true"
    />

    <meta name="twitter:title" content="{{ title }}" data-react-helmet="true" />
    <meta
      name="twitter:description"
      content="{{ seo.description }}"
      data-react-helmet="true"
    />
    {% endwith %}

    <link
      rel="canonical"
      href="{{ request.build_absolute_uri }}"
      data-react-helmet="true"
    />
    <meta name="robots" content="index, follow" data-react-helmet="true" />

    <link rel="icon" href="assets/logo/logo.svg" type="image/svg+xml" />
    <link rel="icon" sizes="16x16" href="assets/logo/favicons/16x16.png" />
    <link rel="icon" sizes="24x24" href="assets/logo/favicons/24x24.png" />
    <link rel="icon" sizes="32x32" href="assets/logo/favicons/32x32.png" />
    <link rel="icon" sizes="48x48" href="assets/logo/favicons/48x48.png" />
    <link rel="icon" sizes="64x64" href="assets/logo/favicons/64x64.png" />
    <link rel="icon" sizes="96x96" href="assets/logo/favicons/96x96.png" />
    <link rel="icon" sizes="128x128" href="assets/logo/favicons/128x128.png" />
  </head>
  <body class="h-full">
    <div class="flex h-full flex-col overflow-auto" id="root"></div>
  </body>
</html>
